version: '3.8'

services:
  server:
    image: server:0.0.1
    container_name: server
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - webnet
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.40.7
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - webnet
    depends_on:
      - server
    restart: unless-stopped

  grafana:
    image: grafana/grafana:9.4.2
    container_name: grafana
    volumes:
      - ./grafana/config.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/datasource.yml:/etc/grafana/provisioning/datasources/default.yaml:ro
      - ./grafana/dashboard.yml:/etc/grafana/provisioning/dashboards/default.yaml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    networks:
      - webnet
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  webnet:
    driver: bridge